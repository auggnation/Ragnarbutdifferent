<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MILD-VIKING // NETWORK MONITOR</title>
<script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
<style>
/* ── Reset & base ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace;color:#fff}

/* ── Full-screen canvas ──────────────────────────────────────── */
#bg{position:fixed;inset:0;width:100%;height:100%;z-index:0}

/* ── HUD overlay ─────────────────────────────────────────────── */
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between}

/* ── Top bar ─────────────────────────────────────────────────── */
#top-bar{
  display:flex;align-items:center;
  padding:9px 14px;gap:8px;
  background:rgba(0,0,0,.88);border-bottom:1px solid rgba(255,255,255,.08);
  pointer-events:all;
}
#title-main{
  font-size:15px;letter-spacing:5px;font-weight:700;
  text-transform:uppercase;text-shadow:0 0 14px currentColor;
  white-space:nowrap;flex-shrink:0;margin-right:6px;
}
.top-btn{
  font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;
  text-transform:uppercase;padding:5px 11px;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(0,0,0,.5);color:rgba(255,255,255,.6);
  cursor:pointer;text-decoration:none;white-space:nowrap;
  transition:all .2s;display:inline-block;flex-shrink:0;
}
.top-btn:hover{border-color:rgba(255,255,255,.7);color:#fff;background:rgba(255,255,255,.05)}
.top-btn.active{border-color:currentColor;color:currentColor}

/* ── Bottom bar ───────────────────────────────────────────────── */
#bottom-bar{
  display:flex;align-items:flex-end;gap:14px;
  padding:10px 16px 14px;
  background:linear-gradient(0deg,rgba(0,0,0,.85) 0%,transparent 100%);
}
#traffic-left{flex:1;min-width:0}
#info-right{flex-shrink:0;text-align:right;min-width:130px}
#net-ip{font-size:13px;font-weight:700;letter-spacing:1px;text-shadow:0 0 8px currentColor}
#net-ssid{font-size:10px;opacity:.6;margin-top:2px;letter-spacing:1px}
/* hidden elements kept so JS writes don't error */
#net-type{display:none}
#stat-subnet{display:none}

#level-badge{
  display:flex;flex-direction:column;align-items:flex-end;margin-top:6px;
}
#level-text{font-size:9px;letter-spacing:3px;opacity:.5;text-transform:uppercase}
#level-num{font-size:20px;font-weight:700;letter-spacing:2px;line-height:1;text-shadow:0 0 10px currentColor}
#level-bar-wrap{width:60px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:3px;overflow:hidden}
#level-bar{height:100%;border-radius:2px;transition:width .5s ease;box-shadow:0 0 6px currentColor}

/* hidden tl-speed so JS writes don't error */
#tl-speed{display:none}

/* ── Center overlay (mode label) ─────────────────────────────── */
#center-overlay{
  display:flex;align-items:center;justify-content:center;
  flex:1;pointer-events:none;
}
#mode-label{
  font-size:11px;letter-spacing:6px;text-transform:uppercase;
  opacity:0;transition:opacity .4s ease;
  padding:4px 14px;border:1px solid currentColor;
  text-shadow:0 0 10px currentColor;
  box-shadow:0 0 10px currentColor;
}

/* ── Bottom bar ───────────────────────────────────────────────── */
#bottom-bar{
  padding:10px 20px 14px;
  background:linear-gradient(0deg,rgba(0,0,0,.85) 0%,transparent 100%);
}
#traffic-row{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.traffic-block{flex:1;display:flex;flex-direction:column;gap:3px}
.traffic-label{font-size:9px;letter-spacing:2px;opacity:.6;text-transform:uppercase}
.traffic-bar-wrap{height:4px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.traffic-bar{height:100%;border-radius:3px;transition:width .3s ease;box-shadow:0 0 5px currentColor}
.traffic-val{font-size:13px;font-weight:700;letter-spacing:1px;text-shadow:0 0 8px currentColor}

#stats-row{display:flex;align-items:center;gap:12px;opacity:.55}
#stat-devices{font-size:10px;letter-spacing:2px}
#stat-uptime{font-size:10px;letter-spacing:2px}
#stat-speed{font-size:10px;letter-spacing:1px;margin-top:3px;opacity:.7}
#stat-conn{font-size:10px;letter-spacing:2px}

/* speedtest-status overlay near top bar */
#speedtest-status{
  position:fixed;top:56px;right:16px;z-index:20;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  opacity:0;transition:opacity .3s;pointer-events:none;
}

/* ── Settings & password modals ───────────────────────────────── */
.mv-modal-overlay{
  position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.8);
  display:flex;align-items:center;justify-content:center;
}
.mv-modal-overlay.hidden{display:none}
.mv-modal{
  background:#0a0a1a;border:1px solid rgba(255,255,255,.2);
  padding:28px 32px;min-width:320px;max-width:420px;width:90%;
  font-size:12px;letter-spacing:1px;
}
.mv-modal h2{font-size:13px;letter-spacing:4px;text-transform:uppercase;margin-bottom:20px;opacity:.8}
.mv-field{margin-bottom:16px}
.mv-field label{display:block;font-size:10px;letter-spacing:3px;text-transform:uppercase;opacity:.55;margin-bottom:6px}
.mv-field input{
  width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-family:'Courier New',monospace;font-size:13px;padding:8px 10px;outline:none;
}
.mv-field input:focus{border-color:rgba(255,255,255,.5)}
.mv-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.mv-btn{
  font-family:'Courier New',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;
  padding:7px 18px;border:1px solid rgba(255,255,255,.3);background:transparent;
  color:rgba(255,255,255,.7);cursor:pointer;transition:all .2s;
}
.mv-btn:hover{border-color:#fff;color:#fff}
.mv-btn.primary{border-color:currentColor;color:#fff}
.mv-msg{font-size:10px;letter-spacing:1px;margin-top:10px;opacity:.6;min-height:14px}

/* ── E-paper screen viewer widget (floating left-center) ─────── */
#screen-widget{
  position:fixed;left:10px;top:50%;transform:translateY(-50%);
  z-index:18;display:flex;flex-direction:column;align-items:stretch;
  gap:4px;pointer-events:all;
}
#screen-toggle-btn{
  font-family:'Courier New',monospace;font-size:8px;letter-spacing:2px;
  text-transform:uppercase;padding:4px 8px;
  border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.75);
  color:rgba(255,255,255,.45);cursor:pointer;transition:all .2s;text-align:center;
}
#screen-toggle-btn:hover{border-color:rgba(255,255,255,.5);color:#fff}
#screen-panel{
  background:rgba(0,0,0,.92);border:1px solid rgba(255,255,255,.15);
  padding:8px;display:flex;flex-direction:column;align-items:center;gap:6px;
}
#screen-panel.hidden{display:none}
#screen-panel img{
  image-rendering:pixelated;max-width:190px;width:100%;
  border:1px solid rgba(255,255,255,.1);
}
#screen-panel-label{font-size:7px;letter-spacing:3px;opacity:.35;text-transform:uppercase}

/* ── VLAN panel ───────────────────────────────────────────────── */
#vlans-panel{
  position:fixed;left:0;top:0;bottom:0;width:240px;z-index:15;
  background:rgba(0,0,0,.85);border-right:1px solid rgba(255,255,255,.1);
  transform:translateX(-100%);transition:transform .3s ease;
  overflow-y:auto;pointer-events:all;
}
#vlans-panel.open{transform:translateX(0)}
#vlans-header{
  padding:14px;border-bottom:1px solid rgba(255,255,255,.1);
  display:flex;justify-content:space-between;align-items:center;
  font-size:11px;letter-spacing:3px;text-transform:uppercase;opacity:.7;
}
#vlans-close{cursor:pointer;font-size:16px;opacity:.6}
#vlans-close:hover{opacity:1}
.vlan-item{
  padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.05);
  font-size:11px;letter-spacing:1px;
}

/* ── Hall of Records button + dropdown ───────────────────────── */
#hof-btn{margin-left:auto}
#hof-panel{
  display:none;position:fixed;top:46px;right:0;width:300px;max-height:80vh;
  z-index:40;overflow-y:auto;
  background:rgba(5,5,5,.97);border:1px solid rgba(255,255,255,.15);
  border-top:none;pointer-events:all;
}
#hof-panel.open{display:block}
#hof-panel-header{
  padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.1);
  font-size:10px;letter-spacing:4px;text-transform:uppercase;
  display:flex;justify-content:space-between;align-items:center;
}
#hof-close{cursor:pointer;font-size:16px;opacity:.5}
#hof-close:hover{opacity:1}
#hof-list{padding:6px 0}
.hof-cat{
  padding:10px 14px 4px;
  font-size:8px;letter-spacing:3px;opacity:.45;text-transform:uppercase;
  border-top:1px solid rgba(255,255,255,.06);
}
.hof-cat:first-child{border-top:none}
.hof-cat-icon{margin-right:5px}
.hof-card{padding:6px 14px 10px}
.hof-card-device{font-size:12px;font-weight:700;letter-spacing:1px;color:#fff;margin-bottom:2px}
.hof-card-meta{display:flex;justify-content:space-between;align-items:baseline}
.hof-card-ip{font-size:9px;opacity:.35;letter-spacing:1px}
.hof-card-value{font-size:13px;font-weight:700;letter-spacing:2px;color:#0f0}
#hof-empty{padding:20px 14px;text-align:center;opacity:.35;font-size:10px;letter-spacing:2px}

/* ── Device bubble canvas ─────────────────────────────────────── */
#bubbles{position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:auto;cursor:crosshair}

/* ── Device tooltip card ──────────────────────────────────────── */
#dev-tooltip{
  display:none;position:fixed;z-index:30;
  background:rgba(0,0,0,.82);border:1px solid rgba(255,255,255,.18);
  backdrop-filter:blur(6px);border-radius:6px;
  padding:8px 12px;pointer-events:none;
  font-family:'Courier New',monospace;font-size:11px;
  color:#b0ffb0;line-height:1.7;white-space:nowrap;
}
#dev-tooltip .dt-host{font-size:13px;font-weight:bold;color:#fff;margin-bottom:2px}
#dev-tooltip .dt-row{opacity:.85}

/* ── Scanlines overlay ────────────────────────────────────────── */
#scanlines{
  position:fixed;inset:0;z-index:5;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 2px,
    rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px
  );
}

/* ── Connection indicator ─────────────────────────────────────── */
#conn-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#444;margin-right:5px;vertical-align:middle;transition:background .3s,box-shadow .3s}
#conn-dot.connected{background:#0f0;box-shadow:0 0 6px #0f0}
#conn-dot.ap{background:#fa0;box-shadow:0 0 6px #fa0}
#conn-dot.disconnected{background:#f00;box-shadow:0 0 6px #f00}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="bubbles"></canvas>
<div id="dev-tooltip"></div>
<div id="scanlines"></div>

<!-- ── HUD ── -->
<div id="hud">
  <!-- Top bar: name then buttons left-to-right -->
  <div id="top-bar">
    <div id="title-main">MILD-VIKING</div>
    <button class="top-btn" id="speedtest-btn">⚡ SPEEDTEST</button>
    <button class="top-btn" id="toggle-vlans">⊟ VLANS</button>
    <button class="top-btn" id="scan-btn">⟳ RESCAN</button>
    <a class="top-btn" href="/settings">⚙ SETTINGS</a>
    <button class="top-btn" id="hof-btn">🏆 RECORDS</button>
  </div>

  <!-- Hall of Records dropdown (top-right) -->
  <div id="hof-panel">
    <div id="hof-panel-header">
      <span>⚡ Hall of Records</span>
      <span id="hof-close">✕</span>
    </div>
    <div id="hof-list"><div id="hof-empty">No records yet — keep monitoring!</div></div>
  </div>

  <!-- Center: mode label -->
  <div id="center-overlay">
    <div id="mode-label">IDLE</div>
  </div>

  <!-- Bottom bar: traffic left, info+level right -->
  <div id="bottom-bar">
    <div id="traffic-left">
      <div id="traffic-row">
        <div class="traffic-block">
          <div class="traffic-label">↓ INBOUND</div>
          <div class="traffic-bar-wrap"><div class="traffic-bar" id="recv-bar" style="width:0%"></div></div>
          <div class="traffic-val" id="recv-val">0 B/s</div>
        </div>
        <div class="traffic-block">
          <div class="traffic-label" style="text-align:right">OUTBOUND ↑</div>
          <div class="traffic-bar-wrap"><div class="traffic-bar" id="sent-bar" style="width:0%"></div></div>
          <div class="traffic-val" id="sent-val" style="text-align:right">0 B/s</div>
        </div>
      </div>
      <div id="stats-row">
        <span id="stat-devices">0 DEVICES</span>
        <span id="stat-uptime">UP: 0s</span>
        <span id="stat-conn"><span id="conn-dot"></span>OFFLINE</span>
      </div>
    </div>
    <div id="info-right">
      <div id="net-ip">—.—.—.—</div>
      <div id="net-ssid">Scanning…</div>
      <div id="stat-speed">SPD: —</div>
      <div id="level-badge">
        <div id="level-text">LEVEL</div>
        <div id="level-num">1</div>
        <div id="level-bar-wrap"><div id="level-bar" style="width:0%"></div></div>
      </div>
    </div>
  </div>
</div>
<!-- hidden elements so JS writes don't throw -->
<div id="tl-speed" style="display:none"></div>
<span id="net-type" style="display:none"></span>
<span id="stat-subnet" style="display:none"></span>

<!-- ── VLANs panel (left slide-in) ── -->
<div id="vlans-panel">
  <div id="vlans-header">
    <span>VLANS / SUBNETS</span>
    <span id="vlans-close">✕</span>
  </div>
  <div id="vlans-list"></div>
</div>

<div id="speedtest-status"></div>

<!-- ── E-paper screen viewer widget ── -->
<div id="screen-widget">
  <button id="screen-toggle-btn">📺 TOGGLE SCREEN</button>
  <div id="screen-panel">
    <div id="screen-panel-label">DEVICE SCREEN</div>
    <img id="screen-img" src="/web/screen.png" alt="device screen">
  </div>
</div>

<!-- ── Password gate modal ── -->
<div id="pw-modal" class="mv-modal-overlay hidden">
  <div class="mv-modal">
    <h2>Dashboard Locked</h2>
    <div class="mv-field">
      <label>Password</label>
      <input type="password" id="pw-input" placeholder="enter password" autocomplete="current-password">
    </div>
    <div class="mv-msg" id="pw-msg"></div>
    <div class="mv-actions">
      <button class="mv-btn primary" id="pw-submit">Unlock</button>
    </div>
  </div>
</div>


<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
// COLOUR PALETTES
// ═══════════════════════════════════════════════════════════════════
const PALETTES = {
  idle: {
    bg:       '#050510',
    primary:  '#1a5fff',
    secondary:'#0033cc',
    accent:   '#00aaff',
    glow:     'rgba(0,100,255,',
    text:     '#3377ff',
  },
  active: {
    bg:       '#030d08',
    primary:  '#00ff99',
    secondary:'#00cc66',
    accent:   '#00ffdd',
    glow:     'rgba(0,255,100,',
    text:     '#00ff88',
  },
  attack: {
    bg:       '#0d0200',
    primary:  '#ff3300',
    secondary:'#cc1100',
    accent:   '#ff8800',
    glow:     'rgba(255,80,0,',
    text:     '#ff4400',
  },
};

// ═══════════════════════════════════════════════════════════════════
// WEATHER / TIME-OF-DAY COLOUR SYSTEM
// ═══════════════════════════════════════════════════════════════════
const WEATHER_PALETTES = {
  night:    { bg:'#0d0000', primary:'#cc1500', secondary:'#880e00', accent:'#ff2200', glow:'rgba(180,15,0,',   text:'#dd2200' },
  twilight: { bg:'#0a0400', primary:'#dd6600', secondary:'#aa3300', accent:'#ffaa00', glow:'rgba(220,90,0,',   text:'#ee7700' },
  sunny:    { bg:'#020a00', primary:'#77dd00', secondary:'#44aa00', accent:'#aaff33', glow:'rgba(100,210,0,',  text:'#88cc11' },
  cloudy:   { bg:'#050507', primary:'#7799aa', secondary:'#445566', accent:'#99bbcc', glow:'rgba(110,150,175,',text:'#889aaa' },
  rain:     { bg:'#000410', primary:'#1155ee', secondary:'#003aaa', accent:'#33aaff', glow:'rgba(10,70,230,',  text:'#2266ff' },
  snow:     { bg:'#030308', primary:'#aabbdd', secondary:'#7788bb', accent:'#ddeeff', glow:'rgba(170,190,230,',text:'#bbccee' },
};

function _weatherKey(code, isDay, now, sunrise, sunset) {
  if (!isDay) return 'night';
  const minsFromRise = (now - sunrise) / 60000;
  const minsFromSet  = (sunset  - now) / 60000;
  if (minsFromRise < 45 || minsFromSet < 45) return 'twilight';
  const snowCodes  = [71,72,73,74,75,76,77,85,86];
  const rainCodes  = [51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99];
  const cloudyCodes= [2,3,45,48];
  if (snowCodes.includes(code))  return 'snow';
  if (rainCodes.includes(code))  return 'rain';
  if (cloudyCodes.includes(code)) return 'cloudy';
  return 'sunny';
}

let _currentWeatherKey = '';

function _applyWeatherPalette(key) {
  if (key === _currentWeatherKey) return;
  _currentWeatherKey = key;
  const wp = WEATHER_PALETTES[key];
  // Replace the idle palette so next mode switch picks it up
  Object.assign(PALETTES.idle, wp);
  // If currently idle, apply immediately
  if (mode === 'idle') { palette = PALETTES.idle; applyPalette(palette); }
}

async function fetchWeather() {
  try {
    let lat, lon;
    try {
      const pos = await new Promise((res, rej) =>
        navigator.geolocation.getCurrentPosition(res, rej, {timeout:4000}));
      lat = pos.coords.latitude; lon = pos.coords.longitude;
    } catch {
      const ip = await fetch('https://ipapi.co/json/', {signal: AbortSignal.timeout(5000)}).then(r=>r.json());
      lat = ip.latitude; lon = ip.longitude;
    }
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
                `&current=weather_code,is_day&daily=sunrise,sunset&timezone=auto&forecast_days=1`;
    const w = await fetch(url, {signal: AbortSignal.timeout(8000)}).then(r=>r.json());
    const code    = w.current?.weather_code ?? 0;
    const isDay   = w.current?.is_day ?? 1;
    const sunrise = new Date(w.daily?.sunrise?.[0] ?? 0);
    const sunset  = new Date(w.daily?.sunset?.[0]  ?? 0);
    _applyWeatherPalette(_weatherKey(code, isDay, new Date(), sunrise, sunset));
  } catch(e) { /* silent — keep current palette */ }
}

fetchWeather();
setInterval(fetchWeather, 30 * 60 * 1000); // refresh every 30 min

// ═══════════════════════════════════════════════════════════════════
// ANIMATION ENGINE
// ═══════════════════════════════════════════════════════════════════
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');

let W = 0, H = 0;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Screen background — live copy of the e-paper display
const vikingImg = new Image();
function _loadScreenBg() {
  vikingImg.src = '/web/screen.png?t=' + Date.now();
}
_loadScreenBg();
setInterval(_loadScreenBg, 15000); // refresh every 15 s

function drawVikingBg() {
  if (!vikingImg.complete || !vikingImg.naturalWidth) return;
  const maxW = W * 0.85;
  const maxH = H * 0.75;
  const scale = Math.min(maxW / vikingImg.naturalWidth, maxH / vikingImg.naturalHeight);
  const tW = vikingImg.naturalWidth  * scale;
  const tH = vikingImg.naturalHeight * scale;
  const vx = (W - tW) / 2;
  const vy = (H - tH) / 2;
  ctx.save();
  ctx.filter = 'invert(1)';
  ctx.globalAlpha = 0.18;
  ctx.globalCompositeOperation = 'screen';
  ctx.drawImage(vikingImg, vx, vy, tW, tH);
  ctx.restore();
}

// State
let mode      = 'idle';
let style     = 0;           // 0-3
let intensity = 0;
let palette   = PALETTES.idle;
let targetPalette = PALETTES.idle;
let blendT    = 1.0;         // 0 = fully prev, 1 = fully target

// Particles
const MAX_PARTICLES = 180;
const particles = [];

function mkParticle() {
  const side = Math.floor(Math.random() * 4);
  let x, y;
  if      (side === 0) { x = Math.random() * W; y = -20; }
  else if (side === 1) { x = W + 20; y = Math.random() * H; }
  else if (side === 2) { x = Math.random() * W; y = H + 20; }
  else                  { x = -20; y = Math.random() * H; }
  return {
    x, y,
    vx: (Math.random() - .5) * 1.2,
    vy: (Math.random() - .5) * 1.2,
    r:  Math.random() * 2.5 + .8,
    life: 1.0,
    decay: Math.random() * .003 + .001,
    pulse: Math.random() * Math.PI * 2,
  };
}

// Seed particles
for (let i = 0; i < 60; i++) {
  const p = mkParticle();
  p.x = Math.random() * W;
  p.y = Math.random() * H;
  particles.push(p);
}

// Rings (for style 1)
const rings = [];
function mkRing() {
  return { r: 0, maxR: Math.max(W, H) * .8, life: 1.0, decay: .006 };
}

// Streams (for style 2)
const streams = [];
function mkStream() {
  const angle = Math.random() * Math.PI * 2;
  const dist  = Math.max(W, H) * .5 + 50;
  return {
    x:   W/2 + Math.cos(angle) * dist,
    y:   H/2 + Math.sin(angle) * dist,
    tx:  W/2 + (Math.random() - .5) * 100,
    ty:  H/2 + (Math.random() - .5) * 100,
    t:   0,
    speed: Math.random() * .008 + .003,
    life: 1.0,
    r: Math.random() * 2 + 1,
  };
}

// Radar (for style 3)
let radarAngle = 0;
const radarBlips = [];
function mkBlip() {
  const a = Math.random() * Math.PI * 2;
  const d = Math.random() * Math.min(W,H) * .4;
  return {
    x: W/2 + Math.cos(a)*d,
    y: H/2 + Math.sin(a)*d,
    life: 1.0,
  };
}
for (let i = 0; i < 8; i++) radarBlips.push(mkBlip());

// ── Blend helper ──────────────────────────────────────────────────
function lerpColor(a, b, t) {
  // a, b are hex strings like '#rrggbb' or 'rgba(r,g,b,'
  // Simple: just return target when blended enough
  return t >= .5 ? b : a;
}

// ── Speed scale ───────────────────────────────────────────────────
function speedScale() {
  if (mode === 'attack') return 1.8 + intensity * 2.5;
  if (mode === 'active') return 1.0 + intensity * 0.8;
  return 0.35 + intensity * 0.25;
}

// ── Particle count target ─────────────────────────────────────────
function targetCount() {
  if (mode === 'attack') return Math.floor(80 + intensity * 100);
  if (mode === 'active') return Math.floor(50 + intensity * 40);
  return Math.floor(30 + intensity * 20);
}

// ── Draw functions ─────────────────────────────────────────────────

function drawStyle0(dt) {
  // Particle network
  const spd = speedScale();
  const con = mode === 'attack' ? 80 : mode === 'active' ? 110 : 140;

  // Manage particle count
  while (particles.length < targetCount()) particles.push(mkParticle());
  if (particles.length > MAX_PARTICLES) particles.splice(0, particles.length - MAX_PARTICLES);

  // Update + draw particles
  ctx.save();
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * spd;
    p.y += p.vy * spd;
    p.pulse += 0.05 * spd;
    p.life -= p.decay;
    if (p.life <= 0 || p.x < -50 || p.x > W+50 || p.y < -50 || p.y > H+50) {
      particles[i] = mkParticle();
      continue;
    }

    const alpha = p.life * (.6 + .4 * Math.sin(p.pulse));
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = palette.primary + hexA(alpha * .9);
    ctx.shadowColor = palette.accent;
    ctx.shadowBlur = 6;
    ctx.fill();
  }

  // Draw connections
  ctx.shadowBlur = 0;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i+1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d < con) {
        const alpha = (1 - d/con) * .25 * Math.min(particles[i].life, particles[j].life);
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = palette.accent + hexA(alpha);
        ctx.lineWidth = .5;
        ctx.stroke();
      }
    }
  }
  ctx.restore();
}

function drawStyle1(dt) {
  // Pulse rings from center
  const spd = speedScale();
  const emitRate = mode === 'attack' ? 0.03 : mode === 'active' ? 0.015 : 0.007;

  if (Math.random() < emitRate * spd * 2) rings.push(mkRing());
  while (rings.length > 20) rings.shift();

  ctx.save();
  for (let i = rings.length - 1; i >= 0; i--) {
    const ring = rings[i];
    ring.r += (3 + spd * 4) * dt * 60;
    ring.life -= ring.decay * spd;
    if (ring.life <= 0 || ring.r > ring.maxR) { rings.splice(i, 1); continue; }

    const alpha = ring.life * .4;
    ctx.beginPath();
    ctx.arc(W/2, H/2, ring.r, 0, Math.PI*2);
    ctx.strokeStyle = palette.primary + hexA(alpha);
    ctx.lineWidth = 1.5;
    ctx.shadowColor = palette.glow + '0.5)';
    ctx.shadowBlur = 8;
    ctx.stroke();

    // Secondary faint ring
    if (ring.r > 20) {
      ctx.beginPath();
      ctx.arc(W/2, H/2, ring.r * .85, 0, Math.PI*2);
      ctx.strokeStyle = palette.accent + hexA(alpha * .3);
      ctx.lineWidth = .5;
      ctx.shadowBlur = 0;
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawStyle2(dt) {
  // Particle streams converging to center
  const spd = speedScale();
  const emitRate = mode === 'attack' ? 0.4 : mode === 'active' ? 0.2 : 0.08;

  if (Math.random() < emitRate) streams.push(mkStream());
  while (streams.length > 60) streams.shift();

  ctx.save();
  for (let i = streams.length - 1; i >= 0; i--) {
    const s = streams[i];
    s.t += s.speed * spd;
    s.life = 1 - s.t;
    if (s.t >= 1) { streams.splice(i, 1); continue; }

    const cx = s.x + (s.tx - s.x) * s.t;
    const cy = s.y + (s.ty - s.y) * s.t;
    const alpha = s.life * .8;

    ctx.beginPath();
    ctx.arc(cx, cy, s.r * s.life + .5, 0, Math.PI*2);
    ctx.fillStyle = palette.primary + hexA(alpha);
    ctx.shadowColor = palette.accent;
    ctx.shadowBlur = 4;
    ctx.fill();

    // Trail
    const prevT = Math.max(0, s.t - .06);
    const px = s.x + (s.tx - s.x) * prevT;
    const py = s.y + (s.ty - s.y) * prevT;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(cx, cy);
    ctx.strokeStyle = palette.accent + hexA(alpha * .3);
    ctx.lineWidth = .8;
    ctx.shadowBlur = 0;
    ctx.stroke();
  }
  ctx.restore();
}

function drawStyle3(dt) {
  // Radar sweep
  const spd = speedScale();
  radarAngle += 0.015 * spd;

  const R = Math.min(W, H) * .38;
  const cx = W/2, cy = H/2;

  ctx.save();

  // Radar circles
  for (let i = 1; i <= 4; i++) {
    const r = R * i / 4;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = palette.primary + '22';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Cross-hairs
  ctx.strokeStyle = palette.primary + '22';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx-R, cy); ctx.lineTo(cx+R, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy-R); ctx.lineTo(cx, cy+R); ctx.stroke();

  // Sweep pie-slice
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(radarAngle);
  const sweepGrad = ctx.createLinearGradient(0, 0, R, 0);
  sweepGrad.addColorStop(0, palette.glow + '0)');
  sweepGrad.addColorStop(.6, palette.glow + '0.04)');
  sweepGrad.addColorStop(1, palette.glow + '0.25)');
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.arc(0, 0, R, -0.6, 0);
  ctx.closePath();
  ctx.fillStyle = sweepGrad;
  ctx.shadowColor = palette.accent;
  ctx.shadowBlur = 20;
  ctx.fill();
  ctx.restore();

  // Sweep line
  ctx.save();
  ctx.translate(cx, cy);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(Math.cos(radarAngle) * R, Math.sin(radarAngle) * R);
  ctx.strokeStyle = palette.accent + 'cc';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = palette.accent;
  ctx.shadowBlur = 8;
  ctx.stroke();
  ctx.restore();

  // Blips
  if (Math.random() < 0.02) {
    radarBlips.push(mkBlip());
    if (radarBlips.length > 12) radarBlips.shift();
  }
  for (const blip of radarBlips) {
    blip.life = Math.max(0, blip.life - .004);
    const a = blip.life * .9;
    ctx.beginPath();
    ctx.arc(blip.x, blip.y, 3, 0, Math.PI*2);
    ctx.fillStyle = palette.accent + hexA(a);
    ctx.shadowColor = palette.accent;
    ctx.shadowBlur = 10;
    ctx.fill();
  }

  ctx.restore();
}

// ── Central glow ──────────────────────────────────────────────────
function drawCenterGlow() {
  const r = Math.min(W, H) * .25;
  const pulse = .6 + .4 * Math.sin(Date.now() / (mode === 'attack' ? 250 : mode === 'active' ? 500 : 1200));
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, r);
  const baseAlpha = mode === 'attack' ? .18 : mode === 'active' ? .12 : .07;
  grad.addColorStop(0, palette.glow + (baseAlpha * pulse * 1.5) + ')');
  grad.addColorStop(.4, palette.glow + (baseAlpha * pulse * .5) + ')');
  grad.addColorStop(1, palette.glow + '0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ── Attack glitch overlay ─────────────────────────────────────────
let glitchTimer = 0;
function drawAttackFX() {
  if (mode !== 'attack') return;
  glitchTimer += intensity * .05;
  if (Math.sin(glitchTimer * 7) > .85) {
    const y = Math.random() * H;
    const h = Math.random() * 4 + 1;
    const shift = (Math.random() - .5) * 20 * intensity;
    ctx.save();
    ctx.globalAlpha = .15 * intensity;
    ctx.drawImage(canvas, shift, y, W, h, 0, y, W, h);
    ctx.restore();
  }
  // Vignette pulse
  const vg = ctx.createRadialGradient(W/2, H/2, H*.3, W/2, H/2, H*.8);
  const va = .3 * intensity * (Math.random() * .2 + .8);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, `rgba(180,10,0,${va})`);
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

// ── Main render loop ──────────────────────────────────────────────
let lastTime = 0;
function render(now) {
  const dt = Math.min((now - lastTime) / 1000, .05);
  lastTime = now;

  // Background
  ctx.globalAlpha = 1;
  ctx.fillStyle = palette.bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle hex grid
  drawGrid();

  // Viking background watermark
  drawVikingBg();

  // Center glow
  drawCenterGlow();

  // Active style
  switch (style) {
    case 0: drawStyle0(dt); break;
    case 1: drawStyle1(dt); break;
    case 2: drawStyle2(dt); break;
    case 3: drawStyle3(dt); break;
  }

  // Attack FX
  drawAttackFX();

  requestAnimationFrame(render);
}

function drawGrid() {
  const sz = 40;
  ctx.save();
  ctx.strokeStyle = palette.primary + '0a';
  ctx.lineWidth = .5;
  for (let x = 0; x < W; x += sz) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += sz) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.restore();
}

function hexA(alpha) {
  const a = Math.max(0, Math.min(1, alpha));
  return Math.round(a * 255).toString(16).padStart(2, '0');
}

requestAnimationFrame(render);

// ═══════════════════════════════════════════════════════════════════
// HUD UPDATES
// ═══════════════════════════════════════════════════════════════════

const el = id => document.getElementById(id);

// Seed palette from local time so there's no flash before weather loads
(function() {
  const h = new Date().getHours();
  if      (h >= 21 || h < 6)  _applyWeatherPalette('night');
  else if (h < 7  || h >= 20) _applyWeatherPalette('twilight');
  else                         _applyWeatherPalette('sunny');
})();

// Apply palette to HUD
function applyPalette(pal) {
  const c = pal.text;
  el('level-num').style.color = c;
  el('level-bar').style.background = c;
  el('level-bar').style.color = c;
  el('title-main').style.color = c;
  el('net-ip').style.color = c;
  el('recv-val').style.color = c;
  el('sent-val').style.color = c;
  document.querySelectorAll('.traffic-bar').forEach(b => {
    b.style.background = c;
    b.style.color = c;
  });
  el('mode-label').style.color = c;
  el('mode-label').style.borderColor = c;
  el('mode-label').style.boxShadow = `0 0 10px ${c}`;
}

let prevMode = '';
let modeTimeout = null;

// Logarithmic bar width (0-100%) for a bytes/sec value
// 100 MB/s = 100%, using log scale for better visualization
function logBarWidth(bps) {
  if (bps <= 0) return 0;
  const logMax = Math.log10(100_000_000); // 100 MB/s = max
  const logVal = Math.log10(Math.max(1, bps));
  return Math.min(100, (logVal / logMax) * 100);
}

function updateHUD(data) {
  // Mode change
  if (data.animation_mode !== prevMode) {
    prevMode = data.animation_mode;
    mode = data.animation_mode;
    palette = PALETTES[mode] || PALETTES.idle;
    applyPalette(palette);

    const labels = { idle: 'IDLE', active: 'ACTIVE', attack: '⚡ STORM' };
    el('mode-label').textContent = labels[mode] || mode.toUpperCase();
    el('mode-label').style.opacity = '1';
    if (modeTimeout) clearTimeout(modeTimeout);
    modeTimeout = setTimeout(() => { el('mode-label').style.opacity = '0'; }, 3000);
  }

  style     = data.animation_style || 0;
  intensity = data.animation_intensity || 0;

  // Level
  el('level-num').textContent = data.level || 1;
  el('level-bar').style.width = ((data.level_progress || 0) * 100).toFixed(1) + '%';

  // Network info
  el('net-ip').textContent  = data.current_ip  || '—.—.—.—';
  el('net-ssid').textContent = data.current_ssid
    ? '📡 ' + data.current_ssid
    : (data.connection_type === 'ethernet' ? '🔌 ETHERNET' : '⚠ NO NETWORK');
  el('net-type').textContent = (data.connection_type || 'UNKNOWN').toUpperCase();

  // Traffic bars
  el('recv-val').textContent = data.recv_rate_human || '0 B/s';
  el('sent-val').textContent = data.sent_rate_human || '0 B/s';
  el('recv-bar').style.width = logBarWidth(data.recv_rate).toFixed(1) + '%';
  el('sent-bar').style.width = logBarWidth(data.sent_rate).toFixed(1) + '%';

  // Stats row
  el('stat-devices').textContent = (data.device_count || 0) + ' DEVICES';
  el('stat-uptime').textContent  = 'UP: ' + (data.uptime_human || '0s');
  el('stat-subnet').textContent  = data.subnet || data.vlan_subnets?.[0] || '—';
  if (data.speedtest_dl || data.speedtest_ul) {
    const at = data.speedtest_at ? ' @ ' + data.speedtest_at.slice(-5) : '';
    const spdTxt = `↓${(data.speedtest_dl||0).toFixed(0)} ↑${(data.speedtest_ul||0).toFixed(0)} Mb${at}`;
    el('stat-speed').textContent = spdTxt;
    el('tl-speed').textContent = spdTxt;
  }

  // Connection dot
  const dot = el('conn-dot');
  const connText = el('stat-conn');
  if (data.connection_type === 'ethernet') {
    dot.className = 'connected';
    connText.innerHTML = '<span id="conn-dot" class="connected"></span>ETHERNET';
  } else if (data.connection_type === 'wifi') {
    dot.className = 'connected';
    connText.innerHTML = '<span id="conn-dot" class="connected"></span>WIFI';
  } else if (data.connection_type === 'ap') {
    dot.className = 'ap';
    connText.innerHTML = '<span id="conn-dot" class="ap"></span>AP MODE';
  } else {
    dot.className = 'disconnected';
    connText.innerHTML = '<span id="conn-dot" class="disconnected"></span>OFFLINE';
  }
}

// ═══════════════════════════════════════════════════════════════════
// FLOATING DEVICE BUBBLES
// ═══════════════════════════════════════════════════════════════════

const bubbleCanvas = el('bubbles');
const bctx = bubbleCanvas.getContext('2d');

// node: {ip, mac, label, x, y, vx, vy, r, targetR, rateIn, rateOut, connections, pulse, radarFlash}
let _bubbleNodes = {};
let _sphereRadarAngle = 0;  // always-spinning radar angle for sphere illumination

function _resizeBubbles() {
  bubbleCanvas.width  = window.innerWidth;
  bubbleCanvas.height = window.innerHeight;
}
window.addEventListener('resize', _resizeBubbles);
_resizeBubbles();

function updateBubbles(devices) {
  if (!devices) return;
  const W = bubbleCanvas.width, H = bubbleCanvas.height;
  const existing = new Set(Object.keys(_bubbleNodes));

  devices.forEach(d => {
    const ip = d.ip;
    existing.delete(ip);
    const totalRate = (d.rate_in || 0) + (d.rate_out || 0);
    // Radius: 18px baseline, grows with traffic (up to 70px at ~1.5 MB/s)
    const targetR = 18 + Math.min(52, Math.sqrt(totalRate / 300));

    if (!_bubbleNodes[ip]) {
      _bubbleNodes[ip] = {
        ip, mac: d.mac || '', hostname: d.hostname || '', label: d.hostname || ip,
        x: W * 0.15 + Math.random() * W * 0.70,
        y: H * 0.20 + Math.random() * H * 0.60,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: targetR, targetR,
        rateIn: d.rate_in || 0, rateOut: d.rate_out || 0,
        connections: d.connections || 0,
        pulse: Math.random() * Math.PI * 2,
        radarFlash: 0,
      };
    } else {
      const n = _bubbleNodes[ip];
      n.targetR     = targetR;
      n.rateIn      = d.rate_in  || 0;
      n.rateOut     = d.rate_out || 0;
      n.hostname    = d.hostname || n.hostname || '';
      n.connections = d.connections || 0;
      n.label       = d.hostname || ip;
      n.mac         = d.mac || n.mac || '';
    }
  });
  existing.forEach(ip => delete _bubbleNodes[ip]);
}

function _fmtRate(v) {
  if (v >= 1048576) return `${(v/1048576).toFixed(1)}M`;
  if (v >= 1024)    return `${(v/1024).toFixed(0)}K`;
  return `${v}B`;
}

function _drawBubbles(ts) {
  const W = bubbleCanvas.width, H = bubbleCanvas.height;
  bctx.clearRect(0, 0, W, H);

  // Always spin the radar angle for device sphere illumination
  _sphereRadarAngle = (_sphereRadarAngle + 0.008) % (Math.PI * 2);

  const pal = PALETTES[mode] || PALETTES.idle;
  const nodes = Object.values(_bubbleNodes);
  const scx = W / 2, scy = H / 2;

  nodes.forEach(n => {
    // Physics: drift + soft wall bounce
    n.x += n.vx;
    n.y += n.vy;
    const totalRateNow = n.rateIn + n.rateOut;
    const isActivePhy  = totalRateNow > 5_000;
    // Active devices: strong repulsion so they stay on screen always
    const margin  = n.r + (isActivePhy ? 80  : 12);
    const force   = isActivePhy ? 0.18 : 0.05;
    const topY    = margin + 60;
    const botY    = H - margin - 50;
    if (n.x < margin)  { n.vx += force; }
    if (n.x > W - margin) { n.vx -= force; }
    if (n.y < topY)    { n.vy += force; }
    if (n.y > botY)    { n.vy -= force; }
    // Hard clamp for active devices — never let them go off screen
    if (isActivePhy) {
      n.x = Math.max(margin, Math.min(W - margin, n.x));
      n.y = Math.max(topY, Math.min(botY, n.y));
    }
    const maxSpd = isActivePhy ? 0.7 : 0.6;
    const spd = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
    if (spd > maxSpd) { n.vx *= maxSpd / spd; n.vy *= maxSpd / spd; }
    n.vx += (Math.random() - 0.5) * 0.02;
    n.vy += (Math.random() - 0.5) * 0.02;
    n.r  += (n.targetR - n.r) * 0.05;
    n.pulse += 0.04 + (n.rateIn + n.rateOut) / 5_000_000;

    // Radar sync: illuminate when beam passes over this sphere
    const devAngle  = (Math.atan2(n.y - scy, n.x - scx) + Math.PI * 2) % (Math.PI * 2);
    const angleDiff = Math.min(
      Math.abs(_sphereRadarAngle - devAngle),
      Math.PI * 2 - Math.abs(_sphereRadarAngle - devAngle)
    );
    if (angleDiff < 0.25) {
      n.radarFlash = Math.max(n.radarFlash, 1.0 - angleDiff / 0.25);
    }
    n.radarFlash = Math.max(0, n.radarFlash - 0.012);

    const totalRate = n.rateIn + n.rateOut;
    const isActive  = totalRate > 5_000;
    const pulseAmt  = isActive ? (Math.sin(n.pulse) * 0.5 + 0.5) : 0;

    // Outer glow (radar flash + traffic pulse)
    const glowAlpha = Math.max(pulseAmt * 0.28, n.radarFlash * 0.55);
    if (glowAlpha > 0.04) {
      const glow = bctx.createRadialGradient(n.x, n.y, n.r * 0.5, n.x, n.y, n.r * 2.6);
      glow.addColorStop(0, pal.glow + glowAlpha + ')');
      glow.addColorStop(1, pal.glow + '0)');
      bctx.beginPath();
      bctx.arc(n.x, n.y, n.r * 2.6, 0, Math.PI * 2);
      bctx.fillStyle = glow;
      bctx.fill();
    }

    // 3D sphere body: highlight offset top-left, darker at edge
    const hiX = n.x - n.r * 0.32;
    const hiY = n.y - n.r * 0.32;
    const baseA = 0.18 + pulseAmt * 0.12 + n.radarFlash * 0.22;
    const sphereGrad = bctx.createRadialGradient(hiX, hiY, n.r * 0.04, n.x, n.y, n.r);
    sphereGrad.addColorStop(0,   pal.glow + (baseA + 0.42) + ')');
    sphereGrad.addColorStop(0.5, pal.glow +  baseA         + ')');
    sphereGrad.addColorStop(1,   'rgba(0,0,0,' + (baseA * 0.5) + ')');
    bctx.beginPath();
    bctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    bctx.fillStyle = sphereGrad;
    bctx.fill();

    // Rim
    bctx.strokeStyle = pal.primary + (isActive || n.radarFlash > 0.15 ? 'cc' : '44');
    bctx.lineWidth   = isActive ? 1.5 : 0.8;
    bctx.stroke();

    // Specular highlight (small bright spot top-left)
    const hiGrad = bctx.createRadialGradient(hiX, hiY, 0, hiX, hiY, n.r * 0.45);
    hiGrad.addColorStop(0, 'rgba(255,255,255,0.38)');
    hiGrad.addColorStop(1, 'rgba(255,255,255,0)');
    bctx.beginPath();
    bctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    bctx.fillStyle = hiGrad;
    bctx.fill();

    // Hostname label above sphere
    const hostLabel = (n.hostname && n.hostname !== n.ip)
      ? (n.hostname.length > 14 ? n.hostname.slice(0, 13) + '…' : n.hostname)
      : '';
    if (hostLabel) {
      bctx.font = `bold 9px 'Courier New', monospace`;
      bctx.fillStyle = '#ffffff';
      bctx.textAlign = 'center';
      bctx.textBaseline = 'bottom';
      bctx.fillText(hostLabel, n.x, n.y - n.r - 3);
    }

    // IP label inside sphere (last 2 octets, prominent)
    const fontSize = Math.max(9, Math.min(14, n.r * 0.58));
    bctx.fillStyle = '#ffffff';
    bctx.font = `bold ${fontSize}px 'Courier New', monospace`;
    bctx.textAlign = 'center';
    bctx.textBaseline = 'middle';
    bctx.fillText(n.ip.split('.').slice(-2).join('.'), n.x, n.y);

    // Labels below sphere: full MAC + data rate (always shown)
    const labelY = n.y + n.r + 10;
    bctx.font = '8px \'Courier New\', monospace';
    bctx.fillStyle = pal.accent || pal.primary;
    bctx.textBaseline = 'top';
    if (n.mac) {
      bctx.fillText(n.mac, n.x, labelY);
    }
    const rateStr = (n.rateIn > 200 || n.rateOut > 200)
      ? `↓${_fmtRate(n.rateIn)} ↑${_fmtRate(n.rateOut)}`
      : `${n.ip}`;
    bctx.fillText(rateStr, n.x, labelY + 11);
  });

  requestAnimationFrame(_drawBubbles);
}
requestAnimationFrame(_drawBubbles);

// ── Bubble hover tooltip ─────────────────────────────────────────
const _devTip = el('dev-tooltip');

function _hitBubble(mx, my) {
  for (const n of Object.values(_bubbleNodes)) {
    const dx = mx - n.x, dy = my - n.y;
    if (dx * dx + dy * dy <= (n.r + 12) * (n.r + 12)) return n;
  }
  return null;
}

bubbleCanvas.addEventListener('mousemove', e => {
  const hit = _hitBubble(e.clientX, e.clientY);
  if (!hit) { _devTip.style.display = 'none'; return; }
  const totalRate = hit.rateIn + hit.rateOut;
  const dataStr = totalRate > 200
    ? `↓ ${_fmtRate(hit.rateIn)}/s  ↑ ${_fmtRate(hit.rateOut)}/s`
    : '—';
  const hostLine = (hit.hostname && hit.hostname !== hit.ip) ? hit.hostname : '—';
  _devTip.innerHTML =
    `<div class="dt-host">${hostLine}</div>` +
    `<div class="dt-row">IP &nbsp;: ${hit.ip}</div>` +
    `<div class="dt-row">MAC : ${hit.mac || '—'}</div>` +
    `<div class="dt-row">DATA: ${dataStr}</div>`;
  const tw = _devTip.offsetWidth, th = _devTip.offsetHeight;
  const px = Math.min(e.clientX + 14, window.innerWidth  - tw - 10);
  const py = Math.min(e.clientY + 14, window.innerHeight - th - 10);
  _devTip.style.left    = px + 'px';
  _devTip.style.top     = py + 'px';
  _devTip.style.display = 'block';
});

bubbleCanvas.addEventListener('mouseleave', () => {
  _devTip.style.display = 'none';
});

// ═══════════════════════════════════════════════════════════════════
// DEVICES + VLANS PANELS
// ═══════════════════════════════════════════════════════════════════


function updateVlans(vlans, subnet, gateway) {
  const list = el('vlans-list');
  const nets = vlans && vlans.length ? vlans : (subnet ? [subnet] : []);
  if (!nets.length) {
    list.innerHTML = '<div class="vlan-item" style="opacity:.4">No subnets found</div>';
    return;
  }
  list.innerHTML = nets.map(n => `<div class="vlan-item">${n}</div>`).join('');
  if (gateway) {
    list.innerHTML += `<div class="vlan-item" style="opacity:.5;margin-top:8px">GW: ${gateway}</div>`;
  }
}

el('toggle-vlans').addEventListener('click', () => {
  el('vlans-panel').classList.toggle('open');
});
el('vlans-close').addEventListener('click', () => {
  el('vlans-panel').classList.remove('open');
});

// ═══════════════════════════════════════════════════════════════════
// SOCKET.IO CONNECTION
// ═══════════════════════════════════════════════════════════════════

const socket = io({
  transports: ['websocket', 'polling'],
  reconnectionAttempts: Infinity,
  reconnectionDelay: 1000,
});

socket.on('connect', () => {
  console.log('Connected to Mild-Viking server');
});

socket.on('disconnect', () => {
  prevMode = '';
  el('mode-label').textContent = 'DISCONNECTED';
  el('mode-label').style.opacity = '1';
});

let _speedtestWaiting = false;
let _speedtestWasRunning = false;

socket.on('status_update', data => {
  updateHUD(data);
  updateBubbles(data.devices || []);
  if (data.vlan_subnets || data.subnet) {
    updateVlans(data.vlan_subnets, data.subnet, data.gateway_ip);
  }
  // Detect speedtest completion via the status stream (reliable fallback)
  if (_speedtestWaiting) {
    if (data.speedtest_running) {
      _speedtestWasRunning = true;
    } else if (_speedtestWasRunning) {
      // Just transitioned from running → done
      _speedtestWaiting    = false;
      _speedtestWasRunning = false;
      _onSpeedtestDone(data.speedtest_dl, data.speedtest_ul, data.speedtest_ping);
    }
  }
});

// ── Shared speedtest completion handler ────────────────────────────
function _onSpeedtestDone(dl, ul, ping) {
  el('speedtest-btn').textContent   = '⚡ SPEEDTEST';
  el('speedtest-btn').style.pointerEvents = 'auto';
  const statusEl = el('speedtest-status');
  if (dl || ul) {
    const p   = ping != null ? `  ${Number(ping).toFixed(0)}ms` : '';
    const txt = `↓${Number(dl).toFixed(1)} ↑${Number(ul).toFixed(1)} Mb${p}`;
    statusEl.textContent = txt;
    el('tl-speed').textContent    = txt;
    el('stat-speed').textContent  = `↓${Number(dl).toFixed(0)} ↑${Number(ul).toFixed(0)} Mb`;
  } else {
    statusEl.textContent = 'TEST FAILED';
  }
  statusEl.style.opacity = '1';
  setTimeout(() => { statusEl.style.opacity = '0'; }, 6000);
}

// ── Scan button ───────────────────────────────────────────────────
el('scan-btn').addEventListener('click', () => {
  socket.emit('request_scan');
  el('scan-btn').textContent = '⟳ SCANNING...';
  el('scan-btn').style.pointerEvents = 'none';
  setTimeout(() => {
    el('scan-btn').textContent = '⟳ RESCAN';
    el('scan-btn').style.pointerEvents = 'auto';
  }, 5000);
});

// ── Speedtest button — run on Pi; open speedtest.net if Pi has no internet ──
el('speedtest-btn').addEventListener('click', async () => {
  el('speedtest-btn').textContent     = '⚡ TESTING...';
  el('speedtest-btn').style.pointerEvents = 'none';
  const statusEl = el('speedtest-status');
  statusEl.textContent = 'Running…';
  statusEl.style.opacity = '1';
  let gotResult = false;
  try {
    const d = await fetch('/api/speedtest', {
      method: 'POST',
      signal: AbortSignal.timeout(90000),
    }).then(r => r.json());
    if (d.dl || d.ul) {
      gotResult = true;
      _onSpeedtestDone(d.dl, d.ul, d.ping);
    }
  } catch(e) { /* fall through */ }
  if (!gotResult) {
    statusEl.style.opacity = '0';
    window.open('https://www.speedtest.net/', '_blank', 'noopener,noreferrer');
  }
  el('speedtest-btn').textContent     = '⚡ SPEEDTEST';
  el('speedtest-btn').style.pointerEvents = 'auto';
});

// ── Hall of Records ────────────────────────────────────────────────
const _hofPanel = el('hof-panel');

async function _loadHof() {
  const list = el('hof-list');
  try {
    const r = await fetch('/api/highscores');
    const d = await r.json();
    const cats = d.categories || [];
    if (!cats.length) {
      list.innerHTML = '<div id="hof-empty">No records yet — keep monitoring!</div>';
      return;
    }
    list.innerHTML = cats.map(c => `
      <div class="hof-cat"><span class="hof-cat-icon">${c.icon || '🏆'}</span>${c.title}</div>
      <div class="hof-card">
        <div class="hof-card-device">${c.device}</div>
        <div class="hof-card-meta">
          <span class="hof-card-ip">${c.ip}</span>
          <span class="hof-card-value">${c.value}</span>
        </div>
      </div>`).join('');
  } catch (e) {
    list.innerHTML = '<div id="hof-empty">Unable to load records</div>';
  }
}

el('hof-btn').addEventListener('click', () => {
  const open = _hofPanel.classList.toggle('open');
  el('hof-btn').classList.toggle('active', open);
  if (open) _loadHof();
});
el('hof-close').addEventListener('click', () => {
  _hofPanel.classList.remove('open');
  el('hof-btn').classList.remove('active');
});
document.addEventListener('click', e => {
  if (!_hofPanel.contains(e.target) && e.target !== el('hof-btn')) {
    _hofPanel.classList.remove('open');
    el('hof-btn').classList.remove('active');
  }
});

// ── Screen viewer widget toggle ────────────────────────────────────
el('screen-toggle-btn').addEventListener('click', () => {
  el('screen-panel').classList.toggle('hidden');
  el('screen-toggle-btn').textContent =
    el('screen-panel').classList.contains('hidden') ? '📺 SHOW SCREEN' : '📺 HIDE SCREEN';
});
// Refresh e-paper image every 3s when panel is visible
setInterval(() => {
  if (!el('screen-panel').classList.contains('hidden')) {
    el('screen-img').src = '/web/screen.png?t=' + Date.now();
  }
}, 3000);

// ── Password gate ──────────────────────────────────────────────────
let _authed = localStorage.getItem('mv_authed') === '1';
(async () => {
  try {
    const r = await fetch('/api/settings');
    const d = await r.json();
    // Update title from server
    if (d.device_name) {
      el('title-main').textContent = d.device_name;
      document.title = d.device_name + ' // NETWORK MONITOR';
    }
    // Show password gate if password is set and not already authed
    if (d.password_set && !_authed) {
      el('pw-modal').classList.remove('hidden');
    }
  } catch(e) {}
})();
el('pw-submit').addEventListener('click', async () => {
  const pw = el('pw-input').value;
  try {
    const r = await fetch('/api/auth', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw}),
    });
    if (r.ok) {
      localStorage.setItem('mv_authed', '1');
      el('pw-modal').classList.add('hidden');
    } else {
      el('pw-msg').textContent = '✗ Wrong password';
    }
  } catch(e) {
    el('pw-msg').textContent = '✗ Error';
  }
});
el('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') el('pw-submit').click();
});

// ── Fallback polling if socket not available ───────────────────────
let pollInterval = null;
socket.on('connect_error', () => {
  if (!pollInterval) {
    pollInterval = setInterval(async () => {
      try {
        const r = await fetch('/api/status');
        const d = await r.json();
        updateHUD(d);
      } catch(e) {}
    }, 2000);
  }
});
socket.on('connect', () => {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
});
</script>
